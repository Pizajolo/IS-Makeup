<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Belt and braces with the Disallow in robots.txt. The admin page is public
      by necessity — it has to be reachable for Inés to log in — but there is no
      reason for it to appear in search results.
    -->
    <meta name="robots" content="noindex, nofollow" />
    <title>Content Manager — I.S Makeup</title>
    <link rel="icon" href="/assets/logo.jpg" />
  </head>
  <body>
    <!--
      Pinned rather than floating on @latest. Inés depends on this page to
      publish; an upstream release should never be able to change or break it
      overnight without someone choosing to take the update.

      To upgrade: bump the version here, load /admin/ locally, and confirm a
      post still opens and saves before committing.
    -->
    <script src="https://unpkg.com/@sveltia/cms@0.172.2/dist/sveltia-cms.js" type="module"></script>

    <!--
      Separate tag rather than an inline `import` of both. Wrapping the bundle
      in an inline module left the page blank — the CMS initialised (it set
      data-theme on <html>) but never mounted its UI. Module scripts with src
      execute in document order, so this still runs after the bundle, and
      editor-components.js waits for window.CMS regardless.
    -->
    <script src="./editor-components.js" type="module"></script>
  </body>
</html>
