# Sveltia CMS — I.S Makeup
#
# Read this alongside CMS-SETUP.md, which covers the GitHub OAuth app and the
# Cloudflare Worker that `base_url` below points at.
#
# Design rule carried over from the implementation plan: posts are documents,
# not forms. Frontmatter here is metadata only. Everything visual — subheadings,
# photos, tables, links, videos — lives in the single `body` field, so Inés can
# put anything anywhere, as many times as she likes.

backend:
  name: github
  repo: Pizajolo/IS-Makeup
  branch: main
  # TODO: replace with the deployed sveltia-cms-auth Worker URL — see CMS-SETUP.md.
  # Until this is real, sign in with "Sign In with Token" (a GitHub PAT), which
  # ignores base_url entirely and is fine for your own testing.
  base_url: https://REPLACE-ME.workers.dev

site_url: https://ismakeup.pt
display_url: https://ismakeup.pt
# Root-relative on purpose: this resolves against whatever host is serving the
# CMS, so the logo shows on is-makeup.pages.dev today and on ismakeup.pt once
# DNS moves in Phase 6. An absolute ismakeup.pt URL renders broken until then.
#
# The transparent PNG rather than logo.jpg — the source is a coral circle on a
# white square, which reads as a white box against Sveltia's dark UI. The site's
# own topbar crops it with border-radius; the CMS can't, so the crop is baked in.
logo_url: /assets/logo-mark.png

# No `publish_mode`, so saves commit straight to main. Sveltia has not shipped
# editorial workflow yet; the `draft` toggle on each post is what keeps
# unfinished writing off the live site. New posts default to draft.

# A top-level media_folder is required even though the blog collection overrides
# it below — Sveltia refuses to load the config without one. This value is what
# the standalone Assets browser shows, so it points at the same place uploads
# actually go.
media_folder: src/assets/blog

# Uploads are converted to WebP and capped at 2048px in the browser, before
# anything is committed. The generous max_file_size is deliberate — it lets her
# drag a photo straight off a phone, and the transformation is what decides
# what actually lands in git. This is the guardrail against repo bloat.
media_libraries:
  all:
    max_file_size: 20971520 # 20 MB in, a few hundred KB out
    transformations:
      raster_image:
        format: webp
        quality: 85
        width: 2048
        height: 2048

i18n:
  # Matches the folders Phase 3 created: src/content/blog/{en,pt,es}/
  structure: multiple_folders
  locales: [en, pt, es]
  default_locale: en

  # Only English is switched on when a new post is created. Without this,
  # Sveltia enforces every required field in every locale — unlike Decap, which
  # only checked the default — so a new post could not be saved until all three
  # languages were written. That makes "write one language now, translate
  # later" impossible, which is the entire point of the translation workflow.
  #
  # Portuguese and Spanish are switched on per post from the three-dot menu at
  # the top right of the editor, or they appear on their own once the
  # translation workflow has written those files.
  #
  # Note this keeps `required` meaningful: a locale that is switched off gets no
  # file at all, so there is no half-empty entry for the content schema to
  # reject at build time.
  initial_locales: default

collections:
  - name: blog
    label: Journal
    label_singular: Post
    description: >-
      Notes and tips for brides. Write in English first — the Portuguese and
      Spanish versions live behind the language switcher at the top right of the
      editor.
    folder: src/content/blog
    create: true
    # `| localize` gives each language its own filename, so the Portuguese post
    # gets a Portuguese URL. Sveltia links the three files together by writing a
    # `translationKey` property into each — which is exactly the field the
    # content schema already reads.
    slug: '{{title | localize}}'
    i18n: true

    # Preview pane off by design. It would have to be a second, hand-written
    # copy of the Astro post template, and it would drift. The Cloudflare
    # preview deployment shows the real thing instead.
    editor:
      preview: false

    # Relative, so it resolves to src/assets/blog/ and the path written into the
    # markdown stays relative too. That is what lets Astro and Sharp optimise
    # body images into WebP with a srcset — an absolute /uploads/ path would be
    # copied through untouched.
    media_folder: ../../../assets/blog
    public_folder: ../../../assets/blog

    fields:
      - name: title
        label: Title
        widget: string
        i18n: true

      - name: description
        label: Summary
        hint: >-
          One or two sentences. This is what shows on the journal cards, in
          Google results, and when someone shares the post.
        widget: text
        i18n: true

      - name: date
        label: Published
        widget: datetime
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
        # Same date in all three languages — it is one post, published once.
        i18n: duplicate

      - name: updated
        label: Last updated
        hint: Only fill this in if you substantially rewrite the post later.
        widget: datetime
        date_format: 'YYYY-MM-DD'
        time_format: false
        picker_utc: true
        required: false
        i18n: duplicate

      - name: heroImage
        label: Cover photo
        widget: image
        i18n: duplicate
        # No "insert from URL". A pasted link skips the whole image pipeline —
        # no WebP, no srcset, no size control — and breaks the build with an
        # unhelpful error the moment Cloudflare tries to deploy it. The content
        # schema rejects remote URLs too; this stops one being entered at all.
        choose_url: false

      - name: heroAlt
        label: Cover photo description
        hint: >-
          Describe the photo in a few words, for readers using a screen reader
          and for Google. For example: "Bride with soft bridal makeup, Sintra".
        widget: string
        # Required in the editor because it is required in the content schema —
        # a missing one fails the build. Alt text is the field everyone skips,
        # so it is enforced in both places.
        required: true
        i18n: true

      - name: tags
        label: Tags
        hint: A few words each, translated per language. Optional.
        widget: list
        required: false
        i18n: true

      - name: location
        label: Location
        hint: >-
          Only if the post is about a specific place — Sintra, Comporta, the
          Algarve. Helps the post show up in local searches. Leave empty
          otherwise.
        widget: string
        required: false
        i18n: duplicate

      - name: draft
        label: Draft — not visible on the site
        hint: >-
          Leave this on while you are still writing. Turn it off and save when
          you are ready for the post to go live.
        widget: boolean
        default: true
        i18n: duplicate

      - name: body
        label: Post
        widget: markdown
        i18n: true
        # rich_text first, so that is what opens by default and Inés never sees
        # markdown. The raw mode stays available as an escape hatch for you.
        modes: [rich_text, raw]
        hint: >-
          To add a video, paste the YouTube link on a line of its own and press
          enter. It stays a plain link here, and becomes a real embedded player
          on the published page.

  # The two fixed homepage sections Inés can edit — FAQ and Services. Unlike the
  # blog (documents), these are structured lists, so they are forms here. Each is
  # one JSON file holding all three languages side by side (single_file i18n).
  # The files already exist with every locale, so initial_locales does not apply.
  #
  # IMPORTANT: every field the JSON carries must be listed below. Sveltia writes
  # back only the fields it knows about, so any field left out here would be
  # silently dropped from the file the next time she saves.
  - name: content
    label: Site sections
    description: The FAQ and Services blocks on the homepage.
    i18n:
      structure: single_file
      locales: [en, pt, es]
    files:
      - name: faq
        label: FAQ
        file: src/data/faq.json
        i18n: true
        description: >-
          Questions brides ask before booking. This is also what builds the FAQ
          structured data that Google and AI assistants read, so keep the
          answers factual and specific.
        fields:
          - name: label
            label: Section eyebrow
            widget: string
            i18n: true
            hint: The small label above the heading, e.g. "06 — FAQ".
          - name: heading
            label: Heading
            widget: string
            i18n: true
            hint: Wrap a word in <em>…</em> to italicise it, e.g. Questions, <em>answered</em>.
          - name: aside
            label: Intro line
            widget: text
            i18n: true
          - name: items
            label: Questions
            label_singular: Question
            widget: list
            i18n: true
            summary: '{{fields.q}}'
            fields:
              - { name: q, label: Question, widget: string, i18n: true }
              - name: a
                label: Answer
                widget: text
                i18n: true
                hint: >-
                  Two or three sentences. Lead with the direct answer and keep
                  the specifics — prices, place names — those are what search
                  engines and AI assistants quote.
      - name: services
        label: Services
        file: src/data/services.json
        i18n: true
        description: >-
          The service cards and their prices. Each card's price is entered once
          and reused for Google's structured data — so it can't fall out of sync.
        fields:
          - name: label
            label: Section eyebrow
            widget: string
            i18n: true
            hint: The small label above the heading, e.g. "02 — Services".
          - name: heading
            label: Heading
            widget: string
            i18n: true
            hint: Wrap a word in <em>…</em> to italicise it.
          - name: aside
            label: Intro line
            widget: text
            i18n: true
          - name: items
            label: Services
            label_singular: Service
            widget: list
            i18n: true
            summary: '{{fields.title}}'
            fields:
              - name: num
                label: Number label
                widget: string
                i18n: true
                hint: 'e.g. "N° 01 — Signature".'
              - name: title
                label: Title
                widget: string
                i18n: true
                hint: Wrap a word in <em>…</em> to italicise it, e.g. Bridal <em>Day-Of</em>.
              - name: body
                label: Description
                widget: text
                i18n: true
              - name: price
                label: Price shown on the card
                widget: string
                i18n: true
                hint: 'Free text, e.g. "From €450 · Trial included" or "By quote".'
              - name: amount
                label: Price for search engines (€)
                widget: number
                value_type: int
                required: false
                i18n: true
                hint: >-
                  The starting price as a plain number, e.g. 450 — used for Google
                  and AI assistants. Leave empty for "by quote" services. Keep it
                  matching the price you wrote above.
              - name: featured
                label: Highlight this card
                widget: boolean
                default: false
                i18n: true
